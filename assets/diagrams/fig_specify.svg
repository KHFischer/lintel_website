<svg viewBox="0 0 1120 512" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1120" height="512" fill="#FAFAFA"/>

  <g id="strategies">
    <g id="strategy-1-code">
      <rect x="160" y="60" width="300" height="120" fill="#2D2D2D" rx="3"/>
      <rect x="160" y="60" width="300" height="20" fill="#6B6B6B"/>
      <line x1="180" y1="100" x2="310" y2="100" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="200" y1="118" x2="377" y2="118" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="200" y1="136" x2="277" y2="136" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="180" y1="154" x2="410" y2="154" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      <line x1="200" y1="172" x2="327" y2="172" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    </g>

    <g id="strategy-2-flowchart">
      <rect x="160" y="210" width="300" height="120" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round" rx="3"/>
      <rect x="220" y="233" width="60" height="24" fill="none" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round" rx="2"/>
      <rect x="340" y="233" width="60" height="24" fill="none" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round" rx="2"/>
      <rect x="280" y="283" width="60" height="24" fill="none" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round" rx="2"/>
      <line x1="280" y1="245" x2="336" y2="245" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="340,245 334,241 334,249" fill="#2D2D2D"/>
      <line x1="370" y1="257" x2="335" y2="280" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="330,283 333,277 337,282" fill="#2D2D2D"/>
      <line x1="250" y1="257" x2="285" y2="280" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
      <polygon points="290,283 283,282 287,277" fill="#2D2D2D"/>
    </g>

    <g id="strategy-3-question">
      <rect x="160" y="360" width="300" height="120" fill="#FFFFFF" stroke="#2D2D2D" stroke-width="1.5" stroke-linejoin="round" rx="3"/>
      <text x="310" y="430" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="64" font-weight="500" fill="#2D2D2D" text-anchor="middle" dominant-baseline="middle">?</text>
    </g>
  </g>

  <g id="connector">
    <line x1="500" y1="270" x2="620" y2="270" stroke="#2D2D2D" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="620,270 608,264 608,276" fill="#2D2D2D"/>
  </g>

  <g id="ovl-spec">
    <rect x="660" y="60" width="300" height="420" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" stroke-linejoin="round" rx="3"/>
    <rect x="660" y="60" width="300" height="36" fill="#10456B" rx="3"/>
    <text x="690" y="78" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="start" dominant-baseline="middle">strategy.yaml</text>

    <text x="690" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" fill="#2D2D2D" text-anchor="start" dominant-baseline="middle">strategy:</text>
    <text x="704" y="176" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="400" fill="#6B6B6B" text-anchor="start" dominant-baseline="middle">name: "SMA Trend"</text>
    <text x="690" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" fill="#2D2D2D" text-anchor="start" dominant-baseline="middle">signal:</text>
    <text x="704" y="268" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="400" fill="#6B6B6B" text-anchor="start" dominant-baseline="middle">steps:</text>
    <text x="718" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="400" fill="#2D2D2D" text-anchor="start" dominant-baseline="middle">- rolling_mean</text>
    <text x="718" y="340" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="400" fill="#2D2D2D" text-anchor="start" dominant-baseline="middle">- compare</text>
    <text x="690" y="396" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" fill="#2D2D2D" text-anchor="start" dominant-baseline="middle">position_sizing:</text>
    <text x="704" y="432" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="400" fill="#6B6B6B" text-anchor="start" dominant-baseline="middle">weight: 1/n</text>
  </g>
</svg>

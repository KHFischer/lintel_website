<svg viewBox="0 0 380 620" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&amp;family=Inter:wght@400;500;600&amp;display=swap');

    .label-primary { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 500; font-size: 13.5px; fill: #2D2D2D; }
    .label-secondary { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 400; font-size: 10px; fill: #8A8A8A; }
    .heading-seal { font-family: 'Playfair Display', 'Georgia', serif; font-weight: 600; font-size: 16.5px; fill: #FFFFFF; letter-spacing: 0.3px; }
    .label-seal-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 400; font-size: 10px; fill: rgba(255,255,255,0.65); }
    .label-svp-title { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 600; font-size: 12px; fill: #10466E; }
    .label-svp-sub { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 400; font-size: 10px; fill: #6B6B6B; }
    .caption { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 500; font-size: 11px; fill: #10466E; letter-spacing: 0.4px; }
    .blocked-label { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 400; font-size: 8.5px; fill: #B8B0A8; letter-spacing: 0.3px; }
    .verify-label { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 500; font-size: 9px; fill: #6B6B6B; letter-spacing: 0.5px; }
  </style>

  <defs>
    <marker id="arr-blue" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#10466E" stroke-width="1" stroke-linejoin="round" />
    </marker>
    <marker id="arr-gray" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#9B9B9B" stroke-width="1" stroke-linejoin="round" />
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- TOP — INPUTS (side by side)                 -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Strategy Logic -->
  <rect x="14" y="20" width="168" height="56" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" />
  <rect x="14" y="20" width="3" height="56" fill="#C8C0B8" />
  <text x="28" y="45" class="label-primary">Strategy Logic</text>
  <text x="28" y="62" class="label-secondary">Manager's proprietary algorithm</text>

  <!-- Market Data -->
  <rect x="198" y="20" width="168" height="56" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" />
  <rect x="198" y="20" width="3" height="56" fill="#C8C0B8" />
  <text x="212" y="45" class="label-primary">Market Data</text>
  <text x="212" y="62" class="label-secondary">Independently verified</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FLOW ARROWS — INPUTS → BOUNDARY             -->
  <!-- ═══════════════════════════════════════════ -->

  <line x1="98" y1="76" x2="98" y2="144"
        stroke="#10466E" stroke-width="1" stroke-dasharray="6,4" opacity="0.5" />
  <line x1="282" y1="76" x2="282" y2="144"
        stroke="#10466E" stroke-width="1" stroke-dasharray="6,4" opacity="0.5" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- CENTER — SEALED EXECUTION BOUNDARY           -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Outer glow -->
  <rect x="10" y="144" width="360" height="160"
        fill="none" stroke="#10466E" stroke-width="0.5" opacity="0.15" />

  <!-- Main boundary -->
  <rect x="14" y="148" width="352" height="152"
        fill="#10466E" stroke="none" />

  <!-- Inner inset (vault feel) -->
  <rect x="24" y="158" width="332" height="132"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5" />

  <!-- Entry indicators (top edge, aligned with input arrows) -->
  <rect x="91" y="148" width="14" height="4" fill="rgba(255,255,255,0.25)" />
  <rect x="275" y="148" width="14" height="4" fill="rgba(255,255,255,0.25)" />

  <!-- Heading -->
  <text x="190" y="218" text-anchor="middle" class="heading-seal">Sealed Execution</text>
  <text x="190" y="236" text-anchor="middle" class="label-seal-sub">Trusted Execution Environment</text>

  <!-- Exit indicator (bottom edge, centered) -->
  <rect x="183" y="296" width="14" height="4" fill="rgba(255,255,255,0.25)" />

  <!-- Blocked indicator (right side of boundary) -->
  <line x1="330" y1="300" x2="330" y2="340"
        stroke="#C8C0B8" stroke-width="0.8" stroke-dasharray="3,3" />
  <line x1="324" y1="336" x2="336" y2="348" stroke="#C8C0B8" stroke-width="1.2" />
  <line x1="336" y1="336" x2="324" y2="348" stroke="#C8C0B8" stroke-width="1.2" />
  <text x="330" y="364" text-anchor="middle" class="blocked-label">IP BLOCKED</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FLOW ARROW — BOUNDARY → SVP                 -->
  <!-- ═══════════════════════════════════════════ -->

  <line x1="190" y1="300" x2="190" y2="380"
        stroke="#10466E" stroke-width="1.2" marker-end="url(#arr-blue)" />

  <!-- ═══════════════════════════════════════════ -->
  <!-- BOTTOM — SVP OUTPUT                         -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="14" y="388" width="352" height="72"
        fill="#FFFFFF" stroke="#10466E" stroke-width="1" />
  <rect x="14" y="388" width="352" height="4" fill="#10466E" />
  <text x="34" y="414" class="label-svp-title">Strategy Validation Package</text>
  <text x="34" y="432" class="label-svp-sub">Cryptographically signed proof</text>
  <text x="34" y="450" class="label-svp-sub">Immutable · Independently verifiable</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BOTTOM — STAKEHOLDER                        -->
  <!-- ═══════════════════════════════════════════ -->

  <rect x="14" y="478" width="352" height="56"
        fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1" />
  <text x="34" y="503" class="label-primary">Stakeholder</text>
  <text x="34" y="520" class="label-secondary">Investor, auditor, or allocator</text>

  <!-- SVP → Stakeholder -->
  <line x1="190" y1="462" x2="190" y2="472"
        stroke="#9B9B9B" stroke-width="1" marker-end="url(#arr-gray)" />

  <!-- Verifies label -->
  <text x="206" y="474" class="verify-label">VERIFIES</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CAPTION                                     -->
  <!-- ═══════════════════════════════════════════ -->

  <line x1="40" y1="590" x2="110" y2="590" stroke="#E0E0E0" stroke-width="0.5" />
  <text x="190" y="594" text-anchor="middle" class="caption">IP cannot leave. Only evidence leaves.</text>
  <line x1="270" y1="590" x2="340" y2="590" stroke="#E0E0E0" stroke-width="0.5" />

</svg>
